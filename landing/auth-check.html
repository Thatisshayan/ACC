<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ACC — Loading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.logo{color:#00ff88;font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;opacity:0;animation:fade 0.6s ease forwards 0.2s}
@keyframes fade{to{opacity:1}}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.dot{display:inline-block;animation:pulse 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="logo">ACC<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
<script>
// Auth guard — runs before /app loads.
// Supabase config is fetched from /api/config/public so the key is never
// hardcoded in HTML and can be rotated without a redeploy.
(function() {
  fetch('/api/config/public')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(cfg) {
      var SUPABASE_URL  = (cfg && cfg.supabaseUrl)     || '';
      var SUPABASE_ANON = (cfg && cfg.supabaseAnonKey) || '';
      if (!SUPABASE_URL || !SUPABASE_ANON) { window.location.href = '/login'; return; }
      startAuthCheck(SUPABASE_URL, SUPABASE_ANON);
    })
    .catch(function() { window.location.href = '/login'; });

  function startAuthCheck(SUPABASE_URL, SUPABASE_ANON) {
    // Handle magic link hash from Supabase
    var hash = window.location.hash;
    if (hash) {
      var params = new URLSearchParams(hash.replace('#', '?'));
      var token  = params.get('access_token');
      var refresh = params.get('refresh_token');
      if (token) {
        localStorage.setItem('acc_token', token);
        if (refresh) localStorage.setItem('acc_refresh', refresh);
        window.history.replaceState({}, '', '/app');
        loadApp();
        return;
      }
    }

    var token = localStorage.getItem('acc_token');
    if (!token) { window.location.href = '/login'; return; }

    // Verify token is still valid
    fetch(SUPABASE_URL + '/auth/v1/user', {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + token }
    })
    .then(function(r) {
      if (r.ok) { loadApp(); return; }
      // Try refresh
      var refresh = localStorage.getItem('acc_refresh');
      if (!refresh) { signOut(); return; }
      return fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
        body: JSON.stringify({ refresh_token: refresh })
      })
      .then(function(r2) { return r2.json(); })
      .then(function(d) {
        if (d.access_token) {
          localStorage.setItem('acc_token', d.access_token);
          if (d.refresh_token) localStorage.setItem('acc_refresh', d.refresh_token);
          loadApp();
        } else { signOut(); }
      });
    })
    .catch(function() { loadApp(); }); // network error — let app handle it
  }

  function loadApp() {
    // /app serves auth-check.html (the guard).
    // /app/dashboard hits the splat catch-all which serves ui/dist/index.html (the SPA).
    window.location.replace('/app/dashboard');
  }

  function signOut() {
    localStorage.removeItem('acc_token');
    localStorage.removeItem('acc_refresh');
    localStorage.removeItem('acc_user');
    window.location.href = '/login';
  }
})();
</script>
</body>
</html>
