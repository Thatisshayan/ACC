<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#050a05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="#1aff8c" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1aff8c" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"/>
  <!-- radar rings -->
  <circle cx="100" cy="68" r="28" fill="none" stroke="#1aff8c" stroke-width="0.8" opacity="0.3"/>
  <circle cx="100" cy="68" r="18" fill="none" stroke="#1aff8c" stroke-width="0.8" opacity="0.4"/>
  <!-- tower body -->
  <rect x="95" y="56" width="10" height="24" rx="2" fill="#1aff8c" opacity="0.9" filter="url(#glow)"/>
  <rect x="88" y="72" width="24" height="8" rx="2" fill="#1aff8c" opacity="0.8"/>
  <rect x="84" y="78" width="32" height="6" rx="2" fill="#1aff8c" opacity="0.7"/>
  <polygon points="80,84 120,84 116,92 84,92" fill="#1aff8c" opacity="0.7"/>
  <rect x="84" y="92" width="32" height="14" rx="1" fill="#0d2e1a"/>
  <rect x="86" y="94" width="28" height="10" rx="1" fill="#1aff8c" opacity="0.15"/>
  <!-- antenna -->
  <line x1="100" y1="56" x2="100" y2="44" stroke="#1aff8c" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="100" cy="43" r="2.5" fill="#1aff8c" filter="url(#glow)"/>
  <!-- circuit lines -->
  <line x1="100" y1="106" x2="100" y2="118" stroke="#1aff8c" stroke-width="1.5" opacity="0.8"/>
  <line x1="100" y1="118" x2="70" y2="118" stroke="#1aff8c" stroke-width="1.2" opacity="0.7"/>
  <line x1="100" y1="118" x2="130" y2="118" stroke="#1aff8c" stroke-width="1.2" opacity="0.7"/>
  <line x1="70" y1="118" x2="50" y2="138" stroke="#1aff8c" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="118" x2="150" y2="138" stroke="#1aff8c" stroke-width="1" opacity="0.5"/>
  <circle cx="50" cy="138" r="2.5" fill="#1aff8c" opacity="0.8"/>
  <circle cx="150" cy="138" r="2.5" fill="#1aff8c" opacity="0.8"/>
  <circle cx="70" cy="118" r="2" fill="#1aff8c" opacity="0.9"/>
  <circle cx="130" cy="118" r="2" fill="#1aff8c" opacity="0.9"/>
  <!-- side dots -->
  <circle cx="35" cy="100" r="2.5" fill="#1aff8c" opacity="0.6"/>
  <circle cx="165" cy="100" r="2.5" fill="#1aff8c" opacity="0.6"/>
  <line x1="35" y1="100" x2="55" y2="100" stroke="#1aff8c" stroke-width="0.8" opacity="0.4"/>
  <line x1="145" y1="100" x2="165" y2="100" stroke="#1aff8c" stroke-width="0.8" opacity="0.4"/>
  <!-- ACC text -->
  <text x="100" y="158" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">ACC</text>
  <text x="100" y="173" font-family="Arial,sans-serif" font-size="7.5" fill="#1aff8c" text-anchor="middle" letter-spacing="2.5" opacity="0.9">AGENT COMMAND CENTER</text>
  <line x1="70" y1="177" x2="130" y2="177" stroke="#1aff8c" stroke-width="0.8" opacity="0.6"/>
</svg>
