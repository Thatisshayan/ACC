name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Syntax check key backend files
        run: |
          node --check cloud/server.js
          node --check cloud/taskbus/routes.js
          node --check cloud/taskbus/store.js
          node --check cloud/taskbus/router.js
          node --check cloud/connectors/stripe.js
          node --check cloud/integrations/crewai.js

      - name: Module load test
        run: |
          node -e "require('./cloud/connectors/stripe.js');   console.log('stripe OK')"
          node -e "require('./cloud/integrations/crewai.js'); console.log('crewai OK')"
          node -e "require('./cloud/taskbus/store.js');        console.log('store OK')"
          node -e "require('./cloud/taskbus/router.js');       console.log('router OK')"
        env:
          NODE_ENV: test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: cd ui && npm ci 2>/dev/null || npm install

      - name: Build UI
        run: cd ui && npm run build
        env:
          VITE_TASKBUS_API_KEY: ""
