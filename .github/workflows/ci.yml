name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Syntax check key backend files
        run: |
          node --check cloud/server.js
          node --check cloud/taskbus/routes.js
          node --check cloud/taskbus/store.js
          node --check cloud/taskbus/router.js
          node --check cloud/connectors/stripe.js
          node --check cloud/api/cardRoutes.js
          node --check cloud/api/phoneRoutes.js
          node --check cloud/api/billingRoutes.js
          node --check cloud/api/memoryRoutes.js
          node --check cloud/connectors/twilio.js
          node --check cloud/connectors/codeExec.js
          node --check cloud/connectors/browser.js
          node --check cloud/services/privacyCard.js
          node --check cloud/storage/supabaseMemory.js

      - name: Module load test
        run: |
          node -e "require('./cloud/connectors/stripe.js');         console.log('stripe OK')"
          node -e "require('./cloud/taskbus/store.js');             console.log('store OK')"
          node -e "require('./cloud/api/cardRoutes.js');            console.log('cardRoutes OK')"
          node -e "require('./cloud/api/phoneRoutes.js');           console.log('phoneRoutes OK')"
          node -e "require('./cloud/api/billingRoutes.js');         console.log('billingRoutes OK')"
          node -e "require('./cloud/connectors/codeExec.js');       console.log('codeExec OK')"
          node -e "require('./cloud/storage/supabaseMemory.js');    console.log('supabaseMemory OK')"
        env:
          NODE_ENV: test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: cd ui && npm ci 2>/dev/null || npm install

      - name: Build UI
        run: cd ui && npm run build
        env:
          VITE_TASKBUS_API_KEY: ""
